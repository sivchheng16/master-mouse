<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mouse Master Adventure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Quicksand', sans-serif;
        overflow: hidden;
        user-select: none;
        margin: 0;
        background-color: #a5f3fc;
      }
      .title-font {
        font-family: 'Fredoka One', cursive;
      }
      
      /* Tactical Physical Feedback */
      .btn-squish {
        transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), 
                    box-shadow 0.5s ease, 
                    filter 0.5s ease;
        position: relative;
        top: 0;
      }
      .btn-squish:hover {
        transform: translateY(-4px);
        filter: brightness(1.05);
      }
      .btn-squish:active {
        transform: translateY(4px); /* Simulates pressing into the depth of the button */
        filter: brightness(0.95);
      }

      /* Premium 3D Soft Shadow Utility */
      .shadow-3d-soft {
        box-shadow: 
          0 12px 24px -6px rgba(0, 0, 0, 0.12), 
          0 24px 48px -12px rgba(0, 0, 0, 0.18);
      }
      
      .btn-squish:hover.shadow-3d-soft {
        box-shadow: 
          0 20px 30px -8px rgba(0, 0, 0, 0.15), 
          0 30px 60px -15px rgba(0, 0, 0, 0.22);
      }

      /* Floating Animation for Current Level - Slower and smoother */
      @keyframes float-level {
        0%, 100% { transform: translateY(0) scale(1.1); }
        50% { transform: translateY(-12px) scale(1.12); }
      }
      .current-level-float {
        animation: float-level 4s ease-in-out infinite;
      }

      /* Animated Bot Expressions */
      @keyframes bot-float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
      }
      .bot-animate {
        animation: bot-float 8s ease-in-out infinite;
      }

      /* Slower Bounce for Loading Bot */
      @keyframes bot-bounce-slow {
        0%, 100% {
          transform: translateY(-20%);
          animation-timing-function: cubic-bezier(0.8, 0, 1, 1);
        }
        50% {
          transform: translateY(0);
          animation-timing-function: cubic-bezier(0, 0, 0.2, 1);
        }
      }
      .bot-bounce-slow {
        animation: bot-bounce-slow 3s infinite;
      }

      /* Staggered Entrance Animation */
      @keyframes pop-in {
        0% { transform: scale(0.3); opacity: 0; }
        70% { transform: scale(1.03); opacity: 1; }
        100% { transform: scale(1); opacity: 1; }
      }
      .animate-pop-in {
        animation: pop-in 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
      }

      @keyframes bubble-pop {
        0% { transform: scale(0.5) translateY(15px); opacity: 0; }
        80% { transform: scale(1.02) translateY(-2px); opacity: 1; }
        100% { transform: scale(1) translateY(0); opacity: 1; }
      }
      .bubble-pop {
        animation: bubble-pop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      }

      /* Loading Dots Animation */
      .loader-dots div {
        animation: loader-dots 1.5s infinite ease-in-out both;
      }
      .loader-dots div:nth-child(1) { animation-delay: -0.3s; }
      .loader-dots div:nth-child(2) { animation-delay: -0.15s; }
      @keyframes loader-dots {
        0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
        40% { transform: scale(1.0); opacity: 1; }
      }

      .custom-scrollbar::-webkit-scrollbar { width: 8px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(0, 0, 0, 0.08); border-radius: 10px; }
      
      .chapter-card-shadow {
        box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 0.18), 0 20px 40px -10px rgba(0, 0, 0, 0.08);
      }
    </style>
